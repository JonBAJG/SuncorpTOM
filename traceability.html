:root{--bg:#0a0a1a;--gold:#D4A843;--teal:#0D8B8B;--wade:#3498DB;--odin:#2ECC71;--stanlee:#9B59B6;--rogue:#E67E22;--navy:#1A2B4A;--highlight:#00E5FF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#ccc}
.header{padding:16px 24px;background:linear-gradient(135deg,#0d1117,#1a1a2e);border-bottom:2px solid var(--teal)}
h1{font-size:20px;color:var(--gold);font-weight:700}
.subtitle{font-size:11px;color:var(--teal);margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;padding:16px}
.card{border:1px solid rgba(255,255,255,0.1);border-radius:8px;overflow:hidden;transition:all 0.2s;cursor:default}
.card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.card-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.card-name{font-size:13px;font-weight:700;color:#fff}
.card-cead{font-size:9px;color:#888}
.card-squad{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700}
.sq-wade{background:rgba(52,152,219,0.3);color:var(--wade)}
.sq-odin{background:rgba(46,204,113,0.3);color:var(--odin)}
.sq-stanlee{background:rgba(155,89,182,0.3);color:var(--stanlee)}
.sq-rogue{background:rgba(230,126,34,0.3);color:var(--rogue)}
.card-body{padding:0 14px 14px}
.trace-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:10px}
.trace-row:last-child{border:none}
.trace-label{min-width:70px;color:#666;font-size:8px;text-transform:uppercase;letter-spacing:0.5px;padding-top:2px}
.trace-val{flex:1;color:#ccc}
.trace-val a{color:var(--teal);text-decoration:none}
.trace-val a:hover{text-decoration:underline}
.epic-row{background:rgba(155,89,182,0.06);border:1px solid rgba(155,89,182,0.15);border-radius:4px;padding:6px 8px;margin:3px 0;font-size:9px}
.epic-key{color:#9B59B6;font-weight:700}
.epic-name{color:#bbb;margin-left:6px}
.epic-count{float:right;font-size:8px;color:#888}
.section-title{font-size:9px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;padding-bottom:3px;border-bottom:1px solid rgba(13,139,139,0.2)}
.downstream-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:3px;margin:2px;background:rgba(26,43,74,0.3);border:1px solid rgba(13,139,139,0.3);color:var(--teal)}
.req-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px}
.badge-f{background:rgba(212,168,67,0.2);color:var(--gold)}
.badge-nf{background:rgba(155,89,182,0.2);color:#9B59B6}
.cvm-section{padding:8px 16px;background:rgba(0,0,0,0.3)}
.cvm-title{font-size:11px;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.1)}
.filter-bar{padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:rgba(0,0,0,0.2)}
.btn{font-size:10px;padding:4px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#ccc;cursor:pointer;transition:all 0.15s}
.btn:hover{background:rgba(255,255,255,0.12);border-color:var(--teal)}
.btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.card.dimmed{opacity:0.15}
.warn{font-size:8px;color:#E74C3C;background:rgba(231,76,60,0.1);padding:4px 8px;border-radius:3px;margin-top:4px}
</style>

function render(filter){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  assets.forEach(a=>{
    const totalF=a.epics.reduce((s,e)=>s+e.f,0);
    const totalNF=a.epics.reduce((s,e)=>s+e.nf,0);
    const borderColor=a.sqcls==='sq-wade'?'var(--wade)':a.sqcls==='sq-odin'?'var(--odin)':a.sqcls==='sq-stanlee'?'var(--stanlee)':a.sqcls==='sq-rogue'?'var(--rogue)':'rgba(255,255,255,0.2)';
    const dimmed=filter&&!filter(a)?'dimmed':'';
    let h=`<div class="card ${dimmed}" style="border-color:${borderColor}">`;
    h+=`<div class="card-hdr" style="background:linear-gradient(90deg,rgba(0,0,0,0.3),transparent)">`;
    h+=`<div><div class="card-name">${a.name}</div><div class="card-cead">${a.id} · ${a.cvm}</div></div>`;
    h+=`<div style="text-align:right"><span class="card-squad ${a.sqcls}">${a.squad}</span>`;
    h+=`<div style="margin-top:4px"><span class="req-badge badge-f">${totalF}F</span><span class="req-badge badge-nf">${totalNF}NF</span></div></div>`;
    h+=`</div><div class="card-body">`;
    // Traceability chain
    h+=`<div class="trace-row"><span class="trace-label">SAD</span><span class="trace-val">${a.sad.u?'<a href="'+a.sad.u+'" target="_blank">'+a.sad.n+'</a>':'<span style="color:#E74C3C">'+a.sad.n+'</span>'}</span></div>`;
    h+=`<div class="trace-row"><span class="trace-label">IRT</span><span class="trace-val">${a.irt.u?'<a href="'+a.irt.u+'" target="_blank">'+a.irt.n+'</a>':a.irt.n}</span></div>`;
    h+=`<div class="trace-row"><span class="trace-label">Initiative</span><span class="trace-val">${a.init.length?a.init.map(i=>'<a href="'+i.u+'" target="_blank">'+i.n+'</a>').join(', '):'—'}</span></div>`;
    h+=`<div class="trace-row"><span class="trace-label">Owner</span><span class="trace-val">${a.owner} · Tech: ${a.tech} · Lead: ${a.lead}</span></div>`;
    // Epics
    if(a.epics.length){
      h+=`<div class="section-title">Delivery Epics (${a.epics.length})</div>`;
      a.epics.forEach(e=>{
        h+=`<div class="epic-row"><span class="epic-key"><a href="https://jira.suncorp.app/jira/browse/${e.k}" target="_blank" style="color:#9B59B6">${e.k}</a></span>`;
        h+=`<span class="epic-name">${e.n}</span><span class="epic-count">${e.f}F ${e.nf}NF</span></div>`;
      });
    }
    // Downstream
    if(a.downstream.length){
      h+=`<div class="section-title">Downstream Consumers</div>`;
      a.downstream.forEach(d=>{h+=`<span class="downstream-tag">${d}</span>`});
    }
    // Warning
    if(a.warn)h+=`<div class="warn">⚠️ ${a.warn}</div>`;
    h+=`</div></div>`;
    grid.innerHTML+=h;
  });
}
function filterAll(){render(null);document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));document.querySelector('.btn').classList.add('active')}
function filterCVM(cvm){render(a=>a.cvm===cvm);document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'))}
function filterSquad(sq){render(a=>a.squad&&a.squad.toLowerCase().includes(sq.toLowerCase()));document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'))}
render(null);
